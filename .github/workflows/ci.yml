name: CI

on:
  push:
    branches:
      - main
      - master
      - copilot/**
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Sync dependencies
        run: python -m uv sync --locked --dev
      - name: Run production smoke tests
        run: python -m uv run pytest tests
